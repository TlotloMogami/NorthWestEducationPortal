<!doctype html>
<html lang="en" data-page="login">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Admissions</title>
    <link rel="stylesheet" href="login.css" />
    <script defer src="login.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="site-header compact">
        <div class="brand">
          <div class="crest">NW</div>
          <div>
            <h1>Login</h1>
            <p>Continue your application</p>
          </div>
        </div>
        <nav class="nav">
          <a href="home.html">Home</a>
        </nav>
      </header>

      <main class="form-wrapper">
        <form class="card" id="login-form">
          <h2>Please login to continue</h2>
          <p class="lead">Your contact details have been verified.</p>

          <label>
            Email or Phone
            <input type="text" name="login" placeholder="Email or phone" required />
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="Password" required />
          </label>

          <button type="submit" class="btn">Login</button>
          <p class="hint"><a href="forgot.html">Forgot password?</a> We will send a reset link or OTP.</p>
        </form>
      </main>
    </div>
  </body>
</html>
